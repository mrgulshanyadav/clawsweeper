name: Setup Codex CLI
description: Cache, install, and authenticate the OpenAI Codex CLI.
inputs:
  api-key:
    description: OpenAI API key used only by the authentication step.
    default: ""
  auth-mode:
    description: Authentication mode. Use proxy to keep OPENAI_API_KEY out of Codex subprocesses, or login for legacy codex login.
    default: "proxy"
  codex-home:
    description: CODEX_HOME directory. Defaults to an isolated per-run ClawSweeper directory.
    default: ""
  cache-suffix:
    description: Extra cache key suffix for target-tool downloads.
    default: ""
  login-status:
    description: Run `codex login status` after authentication.
    default: "false"
  model:
    description: Internal model resolved behind the local alias proxy.
    default: ""
runs:
  using: composite
  steps:
    - name: Cache Codex CLI and npm downloads
      uses: actions/cache@v5
      with:
        path: |
          ~/.npm
          ~/.cache/node/corepack
          ~/.clawsweeper-repair/codex
        key: ${{ runner.os }}-node24-codex-latest-${{ inputs['cache-suffix'] || 'default' }}-v3
        restore-keys: |
          ${{ runner.os }}-node24-codex-latest-
          ${{ runner.os }}-node24-codex-

    - name: Install Codex CLI
      shell: bash
      run: |
        set -euo pipefail
        codex_root="$HOME/.clawsweeper-repair/codex"
        npm config set prefix "$codex_root"
        npm config set cache "$HOME/.npm"
        if [[ "${RUNNER_OS:-}" == "Windows" ]]; then
          codex_bin="$codex_root"
        else
          codex_bin="$codex_root/bin"
        fi
        echo "$codex_bin" >> "$GITHUB_PATH"
        export PATH="$codex_bin:$PATH"

        codex_version="$(npm view @openai/codex dist-tags.latest)"
        if [[ ! "$codex_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
          echo "Invalid latest Codex CLI version: $codex_version" >&2
          exit 1
        fi
        echo "Installing latest Codex CLI release: $codex_version"
        # Product contract: resolve the latest official release once per run.
        # Keep lifecycle scripts disabled because this step runs before authentication.
        npm install -g "@openai/codex@$codex_version" --ignore-scripts --no-audit --no-fund
        if [[ "${{ inputs['auth-mode'] }}" == "proxy" ]]; then
          # The official proxy has an independent release cadence.
          proxy_version="$(npm view @openai/codex-responses-api-proxy dist-tags.latest)"
          if [[ ! "$proxy_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid latest Codex Responses proxy version: $proxy_version" >&2
            exit 1
          fi
          echo "Installing latest Codex proxy release: $proxy_version"
          npm install -g "@openai/codex-responses-api-proxy@$proxy_version" --ignore-scripts --no-audit --no-fund
        fi
        codex --version

    - name: Resolve Codex home
      shell: bash
      run: |
        set -euo pipefail
        if [[ -n "${{ inputs['codex-home'] }}" ]]; then
          codex_home="${{ inputs['codex-home'] }}"
        else
          codex_home="${RUNNER_TEMP:-${TMPDIR:-/tmp}}/clawsweeper-codex-home/${GITHUB_RUN_ID:-local}-${GITHUB_RUN_ATTEMPT:-1}"
        fi
        mkdir -p "$codex_home"
        chmod 700 "$codex_home"
        echo "CODEX_HOME=$codex_home" >> "$GITHUB_ENV"
        export CODEX_HOME="$codex_home"
        echo "Using isolated CODEX_HOME=$CODEX_HOME"

    - name: Authenticate Codex through Responses proxy
      if: ${{ inputs['auth-mode'] == 'proxy' }}
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs['api-key'] }}
        CLAWSWEEPER_INTERNAL_MODEL: ${{ inputs.model }}
      run: |
        set -euo pipefail
        export CODEX_HOME="${CODEX_HOME:?}"
        test -n "${OPENAI_API_KEY:-}"
        test -n "${CLAWSWEEPER_INTERNAL_MODEL:-}"
        upstream_server_info="$CODEX_HOME/responses-upstream-proxy.json"
        alias_server_info="$CODEX_HOME/responses-alias-proxy.json"
        rm -f "$upstream_server_info" "$alias_server_info"
        (
          printenv OPENAI_API_KEY | env \
            -u OPENAI_API_KEY \
            -u CODEX_API_KEY \
            -u PROXY_API_KEY \
            -u CLAWSWEEPER_INTERNAL_MODEL \
            codex-responses-api-proxy --http-shutdown --server-info "$upstream_server_info"
        ) &
        for _ in {1..100}; do
          [[ -s "$upstream_server_info" ]] && break
          sleep 0.1
        done
        if [[ ! -s "$upstream_server_info" ]]; then
          echo "codex-responses-api-proxy did not write server info" >&2
          exit 1
        fi
        upstream_port="$(node -e 'const fs=require("fs"); const p=process.argv[1]; const data=JSON.parse(fs.readFileSync(p,"utf8")); if (!Number.isInteger(data.port)) process.exit(2); process.stdout.write(String(data.port));' "$upstream_server_info")"
        printf '%s' "$CLAWSWEEPER_INTERNAL_MODEL" | env \
          -u OPENAI_API_KEY \
          -u CODEX_API_KEY \
          -u PROXY_API_KEY \
          -u CLAWSWEEPER_INTERNAL_MODEL \
          node "$GITHUB_ACTION_PATH/../../../scripts/codex-model-alias-proxy.mjs" \
            --upstream "http://127.0.0.1:${upstream_port}" \
            --server-info "$alias_server_info" &
        unset CLAWSWEEPER_INTERNAL_MODEL
        for _ in {1..100}; do
          [[ -s "$alias_server_info" ]] && break
          sleep 0.1
        done
        if [[ ! -s "$alias_server_info" ]]; then
          echo "Codex model alias proxy did not write server info" >&2
          exit 1
        fi
        alias_port="$(node -e 'const fs=require("fs"); const p=process.argv[1]; const data=JSON.parse(fs.readFileSync(p,"utf8")); if (!Number.isInteger(data.port)) process.exit(2); process.stdout.write(String(data.port));' "$alias_server_info")"
        cat > "$CODEX_HOME/config.toml" <<EOF
        model = "internal"
        model_provider = "clawsweeper-responses-proxy"

        [model_providers.clawsweeper-responses-proxy]
        name = "ClawSweeper Responses Proxy"
        base_url = "http://127.0.0.1:${alias_port}/v1"
        wire_api = "responses"
        EOF
        chmod 600 "$CODEX_HOME/config.toml"
        echo "Configured Codex internal model alias."

    - name: Authenticate Codex with login
      if: ${{ inputs['auth-mode'] == 'login' }}
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs['api-key'] }}
      run: |
        set -euo pipefail
        export CODEX_HOME="${CODEX_HOME:?}"
        test -n "${OPENAI_API_KEY:-}"
        printenv OPENAI_API_KEY | codex login --with-api-key >/dev/null
        if [[ "${{ inputs['login-status'] }}" == "true" ]]; then
          codex login status
        fi

    - name: Reject unknown Codex auth mode
      if: ${{ inputs['auth-mode'] != 'proxy' && inputs['auth-mode'] != 'login' }}
      shell: bash
      run: |
        echo "Unsupported setup-codex auth-mode: ${{ inputs['auth-mode'] }}" >&2
        exit 1
