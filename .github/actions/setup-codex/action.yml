name: Setup Codex CLI
description: Cache, install, and authenticate the OpenAI Codex CLI.
inputs:
  auth-mode:
    description: Authentication mode. Use proxy to keep OPENAI_API_KEY out of Codex subprocesses, or login for legacy codex login.
    default: "proxy"
  provider:
    description: Model provider. "openai" uses the local Responses proxy. "nvidia" points Codex directly at NVIDIA NIM (OpenAI Chat-compatible) using NVIDIA_API_KEY.
    default: "openai"
  codex-home:
    description: CODEX_HOME directory. Defaults to an isolated per-run ClawSweeper directory.
    default: ""
  cache-suffix:
    description: Extra cache key suffix for target-tool downloads.
    default: ""
  login-status:
    description: Run `codex login status` after authentication.
    default: "false"
runs:
  using: composite
  steps:
    - name: Cache Codex CLI and npm downloads
      uses: actions/cache@v5
      with:
        path: |
          ~/.npm
          ~/.cache/node/corepack
          ~/.clawsweeper-repair/codex
        key: ${{ runner.os }}-node24-codex-latest-${{ inputs['cache-suffix'] || 'default' }}-v3
        restore-keys: |
          ${{ runner.os }}-node24-codex-latest-
          ${{ runner.os }}-node24-codex-

    - name: Install Codex CLI
      shell: bash
      run: |
        set -euo pipefail
        npm config set prefix "$HOME/.clawsweeper-repair/codex"
        npm config set cache "$HOME/.npm"
        echo "$HOME/.clawsweeper-repair/codex/bin" >> "$GITHUB_PATH"
        export PATH="$HOME/.clawsweeper-repair/codex/bin:$PATH"

        install_env=(env -u OPENAI_API_KEY -u CODEX_API_KEY -u PROXY_API_KEY -u CLAWSWEEPER_INTERNAL_MODEL)
        "${install_env[@]}" npm install -g "@openai/codex@latest" \
          --prefer-online --no-audit --no-fund --ignore-scripts
        if [[ "${{ inputs['auth-mode'] }}" == "proxy" && "${{ inputs['provider'] }}" != "nvidia" ]]; then
          "${install_env[@]}" npm install -g "@openai/codex-responses-api-proxy@latest" \
            --prefer-online --no-audit --no-fund --ignore-scripts
        fi
        codex --version

    - name: Resolve Codex home
      shell: bash
      run: |
        set -euo pipefail
        if [[ -n "${{ inputs['codex-home'] }}" ]]; then
          codex_home="${{ inputs['codex-home'] }}"
        else
          codex_home="$HOME/.clawsweeper-repair/codex-home/${GITHUB_RUN_ID:-local}-${GITHUB_RUN_ATTEMPT:-1}"
        fi
        mkdir -p "$codex_home"
        chmod 700 "$codex_home"
        echo "CODEX_HOME=$codex_home" >> "$GITHUB_ENV"
        export CODEX_HOME="$codex_home"
        echo "Using isolated CODEX_HOME=$CODEX_HOME"

    - name: Configure internal Codex model
      shell: bash
      run: |
        set -euo pipefail
        export CODEX_HOME="${CODEX_HOME:?}"
        test -n "${CLAWSWEEPER_INTERNAL_MODEL:-}"
        model_json="$(node -e 'process.stdout.write(JSON.stringify(process.argv[1]))' "$CLAWSWEEPER_INTERNAL_MODEL")"
        printf 'model = %s\n' "$model_json" > "$CODEX_HOME/config.toml"
        chmod 600 "$CODEX_HOME/config.toml"

    - name: Authenticate Codex through Responses proxy
      if: ${{ inputs['auth-mode'] == 'proxy' && inputs['provider'] != 'nvidia' }}
      shell: bash
      run: |
        set -euo pipefail
        export CODEX_HOME="${CODEX_HOME:?}"
        test -n "${OPENAI_API_KEY:-}"
        server_info="$CODEX_HOME/responses-proxy.json"
        if [[ ! -s "$server_info" ]]; then
          (
            printenv OPENAI_API_KEY | env -u OPENAI_API_KEY -u CODEX_API_KEY -u PROXY_API_KEY \
              codex-responses-api-proxy --http-shutdown --server-info "$server_info"
          ) &
        fi
        for _ in {1..100}; do
          [[ -s "$server_info" ]] && break
          sleep 0.1
        done
        if [[ ! -s "$server_info" ]]; then
          echo "codex-responses-api-proxy did not write server info" >&2
          exit 1
        fi
        port="$(node -e 'const fs=require("fs"); const p=process.argv[1]; const data=JSON.parse(fs.readFileSync(p,"utf8")); if (!Number.isInteger(data.port)) process.exit(2); process.stdout.write(String(data.port));' "$server_info")"
        model_json="$(node -e 'process.stdout.write(JSON.stringify(process.argv[1]))' "$CLAWSWEEPER_INTERNAL_MODEL")"
        cat > "$CODEX_HOME/config.toml" <<EOF
        model = ${model_json}
        model_provider = "clawsweeper-responses-proxy"

        [model_providers.clawsweeper-responses-proxy]
        name = "ClawSweeper Responses Proxy"
        base_url = "http://127.0.0.1:${port}/v1"
        wire_api = "responses"
        EOF
        chmod 600 "$CODEX_HOME/config.toml"
        echo "Configured Codex Responses proxy on localhost."

    - name: Authenticate Codex with NVIDIA NIM (direct chat)
      if: ${{ inputs['auth-mode'] == 'proxy' && inputs['provider'] == 'nvidia' }}
      shell: bash
      run: |
        set -euo pipefail
        export CODEX_HOME="${CODEX_HOME:?}"
        test -n "${NVIDIA_API_KEY:-}"
        test -n "${CLAWSWEEPER_INTERNAL_MODEL:-}"
        model_json="$(node -e 'process.stdout.write(JSON.stringify(process.argv[1]))' "$CLAWSWEEPER_INTERNAL_MODEL")"
        base_url="${NVIDIA_NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}"
        base_json="$(node -e 'process.stdout.write(JSON.stringify(process.argv[1]))' "$base_url")"
        cat > "$CODEX_HOME/config.toml" <<EOF
        model = ${model_json}
        model_provider = "nvidia-nim"

        [model_providers.nvidia-nim]
        name = "NVIDIA NIM"
        base_url = ${base_json}
        wire_api = "chat"
        env_key = "NVIDIA_API_KEY"
        EOF
        chmod 600 "$CODEX_HOME/config.toml"
        echo "Configured Codex for NVIDIA NIM (wire_api=chat). NOTE: NVIDIA_API_KEY is visible to the Codex subprocess (no Responses proxy for NIM)."

    - name: Authenticate Codex with login
      if: ${{ inputs['auth-mode'] == 'login' }}
      shell: bash
      run: |
        set -euo pipefail
        export CODEX_HOME="${CODEX_HOME:?}"
        test -n "${OPENAI_API_KEY:-}"
        printenv OPENAI_API_KEY | codex login --with-api-key >/dev/null
        if [[ "${{ inputs['login-status'] }}" == "true" ]]; then
          codex login status
        fi

    - name: Reject unknown Codex auth mode
      if: ${{ inputs['auth-mode'] != 'proxy' && inputs['auth-mode'] != 'login' }}
      shell: bash
      run: |
        echo "Unsupported setup-codex auth-mode: ${{ inputs['auth-mode'] }}" >&2
        exit 1
